<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" aria-label="E2ScreenRecorder logo" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2979ff"/>
      <stop offset="100%" stop-color="#82b1ff"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#ff8a80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#07090f"/>
  <!-- Monitor frame -->
  <rect x="8" y="10" width="48" height="34" rx="5" stroke="url(#lg)" stroke-width="2"/>
  <!-- Screen -->
  <rect x="12" y="14" width="40" height="26" rx="3" fill="#0e1325"/>
  <!-- REC dot -->
  <circle cx="20" cy="24" r="5" fill="url(#lg2)"/>
  <!-- Progress bar -->
  <rect x="12" y="34" width="40" height="4" rx="2" fill="#1a1f3a"/>
  <rect x="12" y="34" width="26" height="4" rx="2" fill="url(#lg)"/>
  <!-- Stand -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
  <rect x="22" y="52" width="20" height="4" rx="2" stroke="url(#lg)" stroke-width="2"/>
</svg>