<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="100%" stop-color="#0a0c18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1280" height="1" fill="#0c0e1c" opacity="0.4"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- scanlines -->
  <rect width="1280" height="320" fill="url(#scan)" opacity="0.3"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- STB device diagram (right) -->
  <g opacity="0.22" transform="translate(840,60)">
    <!-- TV screen -->
    <rect x="100" y="0" width="260" height="160" rx="10" fill="#0a0c18" stroke="#f97316" stroke-width="2"/>
    <rect x="112" y="12" width="236" height="136" rx="5" fill="#050810" stroke="#1a1a30" stroke-width="1"/>
    <!-- screen content: REC indicator -->
    <circle cx="140" cy="36" r="10" fill="#ef4444" opacity="0.9"/>
    <text x="156" y="41" font-family="monospace" font-size="14" fill="#ef4444">REC 02:34</text>
    <!-- screenshot preview boxes -->
    <rect x="120" y="56" width="100" height="72" rx="4" fill="#1a1a30" stroke="#f97316" stroke-width="1"/>
    <text x="170" y="97" font-family="monospace" font-size="10" fill="#f97316" text-anchor="middle">PNG ✓</text>
    <rect x="230" y="56" width="100" height="72" rx="4" fill="#1a1a30" stroke="#fbbf24" stroke-width="1"/>
    <text x="280" y="90" font-family="monospace" font-size="10" fill="#fbbf24" text-anchor="middle">MP4</text>
    <text x="280" y="105" font-family="monospace" font-size="10" fill="#fbbf24" text-anchor="middle">H.264 ✓</text>
    <!-- STB box -->
    <rect x="130" y="170" width="200" height="40" rx="6" fill="#0d0d1a" stroke="#f97316" stroke-width="2"/>
    <circle cx="155" cy="190" r="5" fill="#f97316"/>
    <text x="210" y="195" font-family="monospace" font-size="12" fill="#fbbf24" text-anchor="middle">Enigma2 STB</text>
    <!-- stand -->
    <rect x="210" y="160" width="40" height="12" rx="3" fill="#1a1a30"/>
    <!-- WebIF badge -->
    <rect x="100" y="220" width="260" height="24" rx="12" fill="#f97316" opacity="0.18"/>
    <text x="230" y="237" font-family="monospace" font-size="12" fill="#fbbf24" text-anchor="middle">WebIF :8765 · LAN Control</text>
  </g>
  <!-- logo: camera + record mark -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#050508" stroke="url(#acc)" stroke-width="3"/>
    <!-- camera body -->
    <rect x="16" y="30" width="84" height="56" rx="8" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <!-- lens -->
    <circle cx="58" cy="58" r="20" fill="none" stroke="url(#acc)" stroke-width="2.5"/>
    <circle cx="58" cy="58" r="10" fill="#f97316" opacity="0.4"/>
    <circle cx="58" cy="58" r="4"  fill="#fbbf24"/>
    <!-- viewfinder -->
    <rect x="72" y="20" width="22" height="14" rx="4" fill="none" stroke="url(#acc)" stroke-width="2"/>
    <!-- REC dot -->
    <circle cx="28" cy="40" r="5" fill="#ef4444" opacity="0.9"/>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="13" fill="#f97316" opacity="0.6" letter-spacing="4">ENIGMA2 SCREEN RECORDER</text>
  <text x="218" y="168" font-family="Arial Black,'Arial Bold',sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="#fff8f0">E2Screen</text>
  <text x="218" y="210" font-family="Arial Black,'Arial Bold',sans-serif" font-size="68" font-weight="900" letter-spacing="-2" fill="url(#acc)">Recorder</text>
  <rect x="220" y="228" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <rect x="222" y="245" width="140" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="292" y="264" font-family="monospace" font-size="13" fill="#fdba74" text-anchor="middle">Screenshot</text>
  <rect x="374" y="245" width="140" height="28" rx="14" fill="#fbbf24" opacity="0.15"/>
  <text x="444" y="264" font-family="monospace" font-size="13" fill="#fde68a" text-anchor="middle">MP4 H.264</text>
  <rect x="526" y="245" width="130" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="591" y="264" font-family="monospace" font-size="13" fill="#fdba74" text-anchor="middle">WebIF :8765</text>
  <text x="222" y="296" font-family="monospace" font-size="12" fill="#6b7280">Python 2.6–3.12+ · Zero Mandatory Deps · All Enigma2 Devices</text>
</svg>